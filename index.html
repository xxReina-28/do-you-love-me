<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>One question for you...</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="loadingScreen">
    <div class="loading-card">
      <div class="loading-hearts">❤️ 💖 ❤️</div>

      <div class="mini-bear-wrap">
        <div class="mini-bear">
          <div class="mini-ear left"></div>
          <div class="mini-ear right"></div>
          <div class="mini-face">
            <span class="mini-eye left"></span>
            <span class="mini-eye right"></span>
            <span class="mini-mouth"></span>
          </div>
        </div>
      </div>

      <h2>Preparing something cute...</h2>

      <div class="loading-bar">
        <div class="loading-fill"></div>
      </div>
    </div>
  </div>

  <!-- Floating Background Hearts -->
  <div class="bg-hearts" aria-hidden="true">
    <span>❤️</span>
    <span>💖</span>
    <span>❤️</span>
    <span>💘</span>
    <span>💞</span>
    <span>❤️</span>
    <span>💖</span>
    <span>❤️</span>
    <span>💘</span>
    <span>💞</span>
    <span>❤️</span>
    <span>💖</span>
  </div>

  <!-- Main App -->
  <div class="app" id="app">
    <div class="bear-scene">
      <div class="bear" id="bear">
        <div class="ear left"></div>
        <div class="ear right"></div>

        <div class="face">
          <span class="eye left"></span>
          <span class="eye right"></span>

          <div class="brow left"></div>
          <div class="brow right"></div>

          <div class="snout">
            <span class="nose"></span>
            <span class="mouth"></span>
          </div>

          <span class="blush left"></span>
          <span class="blush right"></span>

          <span class="tear left"></span>
          <span class="tear right"></span>
        </div>

        <div class="body">
          <div class="arm left"></div>
          <div class="heart-held">❤️</div>
          <div class="arm right"></div>
          <div class="belly"></div>
        </div>
      </div>
    </div>

    <h1 id="question">Do you love me? 🥺</h1>

    <div class="buttons" id="buttonsArea">
      <button id="yesBtn">YES ❤️</button>
      <button id="noBtn">NO 🙃</button>
    </div>

    <p id="message"></p>

    <button id="shareBtn">Share this ❤️</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
